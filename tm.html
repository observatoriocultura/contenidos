<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparativa de Orgullo 2024 vs 2025</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 80%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>¿Qué tan orgulloso se siente de usar Transmilenio como su Medio de Transporte?</h2>
    <canvas id="graficoOrgullo"></canvas>
</div>

<script>
    // Configurar fuente global de Chart.js
    Chart.defaults.font.family = "'Montserrat', sans-serif";

    // Registrar el plugin de datalabels
    Chart.register(ChartDataLabels);

    const ctx = document.getElementById('graficoOrgullo').getContext('2d');
    
    const data = {
        labels: ['Nada orgulloso', 'Poco orgulloso', 'Orgulloso', 'Muy orgulloso', 'Ns/Nr'],
        datasets: [
            {
                label: '2024 (%)',
                data: [13, 45, 36, 6, 0],
                backgroundColor: '#A693CE',
                borderColor: '#A693CE',
                borderWidth: 1
            },
            {
                label: '2025 (%)',
                data: [11.58, 36.58, 45.10, 6.33, 0.41],
                backgroundColor: '#5D4294',
                borderColor: '#5D4294',
                borderWidth: 1
            }
        ]
    };

    const config = {
        type: 'bar',
        data: data,
        options: {
            responsive: true,
            layout: {
                padding: {
                    top: 20 // Espacio para que las etiquetas no se corten
                }
            },
            plugins: {
                legend: {
                    position: 'top',
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + context.raw + '%';
                        }
                    }
                },
                datalabels: {
                    anchor: 'end',
                    align: 'top',
                    color: '#444',
                    font: {
                        weight: 'bold',
                        size: 12
                    },
                    formatter: function(value) {
                        return value + '%';
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return value + '%';
                        }
                    }
                }
            }
        }
    };

    new Chart(ctx, config);
</script>

</body>
</html>
